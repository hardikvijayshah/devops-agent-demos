version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install -r requirements.txt
  build:
    commands:
      - echo "Running tests..."
      - python -m pytest tests/ -v --tb=short 2>/dev/null || python -m unittest discover -s tests -v
      - echo "All tests passed"
artifacts:
  files:
    - '**/*'
